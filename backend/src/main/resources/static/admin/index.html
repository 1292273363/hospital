<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>医院小程序后台管理</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; margin: 0; background: #f6f7fb; }
    .wrap { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
    .side { background: #ffffff; border-right: 1px solid #e9e9ef; padding: 14px; overflow: auto; }
    .brand { font-weight: 700; color: #1AAD19; margin-bottom: 10px; }
    .table-item { padding: 10px 10px; border-radius: 10px; cursor: pointer; }
    .table-item:hover { background: #f2fff2; }
    .table-item.active { background: #e7ffe7; color: #0d8a0c; font-weight: 600; }
    .main { padding: 14px; overflow: auto; }
    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .toolbar input { padding: 8px 10px; border: 1px solid #e9e9ef; border-radius: 10px; background: #fff; }
    .btn { padding: 8px 12px; border-radius: 10px; border: none; background: #1AAD19; color: #fff; cursor: pointer; }
    .btn.secondary { background: #e9eef3; color: #333; }
    .meta { color: #666; font-size: 14px; margin: 6px 0; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; }
    th, td { padding: 10px 8px; border-bottom: 1px solid #f0f0f5; text-align: left; font-size: 13px; vertical-align: top; }
    th { background: #fafbfc; font-size: 12px; color: #444; }
    tr:hover td { background: #fcfffc; }
    .cell-pre { white-space: pre-wrap; word-break: break-word; max-width: 520px; }
    .row-click { cursor: pointer; }
    .modal { position: fixed; left: 0; top: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.35); display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal.show { display: flex; }
    .modal-card { width: min(900px, 100%); background: #fff; border-radius: 14px; box-shadow: 0 18px 55px rgba(0,0,0,0.2); overflow: hidden; }
    .modal-head { padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f5; }
    .modal-head .title { font-weight: 700; }
    .modal-body { padding: 14px; }
    .json { background: #0b1220; color: #cfe2ff; border-radius: 12px; padding: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="side">
    <div class="brand">医院小程序后台管理</div>
    <div id="tableList"></div>
    <div style="margin-top:12px;color:#888;font-size:12px;line-height:1.4;">
      注：如果未配置 `admin.token`，页面可直接访问；如配置了 token，请在请求头中携带 `X-Admin-Token`。
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <div style="font-weight:700;" id="tableTitle">选择一个表</div>
      <div style="flex:1"></div>
      <button class="btn secondary" id="prevBtn">上一页</button>
      <span class="meta" id="pageMeta">—</span>
      <button class="btn secondary" id="nextBtn">下一页</button>
    </div>

    <table>
      <thead>
      <tr id="headerRow"></tr>
      </thead>
      <tbody id="bodyRow"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-head">
      <div class="title" id="modalTitle">详情</div>
      <button class="btn secondary" id="closeModal">关闭</button>
    </div>
    <div class="modal-body">
      <div class="json" id="modalJson">{}</div>
    </div>
  </div>
</div>

<script>
  const apiBase = '/admin/api';
  let currentTable = null;
  let currentPage = 1;
  let currentTotal = 0;
  const pageSize = 20;

  function el(id) { return document.getElementById(id); }

  function showModal(title, obj) {
    el('modalTitle').textContent = title;
    el('modalJson').textContent = JSON.stringify(obj, null, 2);
    el('modal').classList.add('show');
  }

  function closeModal() {
    el('modal').classList.remove('show');
  }

  el('closeModal').addEventListener('click', closeModal);
  el('modal').addEventListener('click', (e) => {
    if (e.target === el('modal')) closeModal();
  });

  async function fetchTables() {
    const res = await fetch(apiBase + '/tables');
    if (!res.ok) {
      alert('加载表列表失败：' + res.status);
      return;
    }
    const data = await res.json();
    const list = data.tables || [];
    el('tableList').innerHTML = list.map(t => {
      return `<div class="table-item" data-name="${t.name}" title="${t.name}">${t.label}</div>`;
    }).join('');

    Array.from(el('tableList').querySelectorAll('.table-item')).forEach(item => {
      item.addEventListener('click', () => {
        currentTable = item.getAttribute('data-name');
        currentPage = 1;
        Array.from(el('tableList').querySelectorAll('.table-item')).forEach(x => x.classList.remove('active'));
        item.classList.add('active');
        loadRows();
      });
    });
  }

  async function loadRows() {
    if (!currentTable) return;
    el('tableTitle').textContent = `表：${currentTable}`;
    const url = `${apiBase}/table/${encodeURIComponent(currentTable)}?page=${currentPage}&pageSize=${pageSize}`;
    const res = await fetch(url);
    if (!res.ok) {
      alert('加载数据失败：' + res.status);
      return;
    }
    const data = await res.json();
    currentTotal = data.total || 0;
    const rows = data.rows || [];

    const columns = rows.length ? Object.keys(rows[0]) : ['id'];

    el('headerRow').innerHTML = columns.map(c => `<th>${c}</th>`).join('');
    el('bodyRow').innerHTML = rows.map(r => {
      const idVal = r.id ?? '';
      return `<tr class="row-click" data-id="${idVal}">${columns.map(c => {
        const v = r[c];
        const text = (v === null || v === undefined) ? '' : String(v);
        return `<td><div class="cell-pre">${escapeHtml(text)}</div></td>`;
      }).join('')}</tr>`;
    }).join('');

    Array.from(el('bodyRow').querySelectorAll('.row-click')).forEach(tr => {
      tr.addEventListener('click', async () => {
        const id = tr.getAttribute('data-id');
        if (!id) return;
        const detailRes = await fetch(`${apiBase}/table/${encodeURIComponent(currentTable)}/${encodeURIComponent(id)}`);
        const detail = await detailRes.json();
        showModal(`表：${currentTable} / id=${id}`, detail.row || detail);
      });
    });

    const pages = Math.max(1, Math.ceil(currentTotal / pageSize));
    el('pageMeta').textContent = `第 ${currentPage} 页 / 共 ${pages} 页（共 ${currentTotal} 条）`;
    el('prevBtn').disabled = currentPage <= 1;
    el('nextBtn').disabled = currentPage >= pages;
  }

  function escapeHtml(str) {
    return str.replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  el('prevBtn').addEventListener('click', () => {
    if (currentPage <= 1) return;
    currentPage -= 1;
    loadRows();
  });
  el('nextBtn').addEventListener('click', () => {
    const pages = Math.max(1, Math.ceil(currentTotal / pageSize));
    if (currentPage >= pages) return;
    currentPage += 1;
    loadRows();
  });

  fetchTables();
</script>
</body>
</html>
